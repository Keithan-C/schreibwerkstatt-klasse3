<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Satzwerkstatt – Schreiben üben</title>
<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#f4f7fa;
  margin:0;
  color:#222;
  line-height:1.6;
}
header{
  background:#2f6f95;
  color:white;
  padding:18px;
  font-size:26px;
  text-align:center;
}
.container{
  max-width:900px;
  margin:auto;
  padding:25px;
}
.panel{
  background:white;
  padding:25px;
  margin-bottom:25px;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
h2{margin-top:0;}
.instructions{
  background:#eef4f8;
  padding:14px;
  border-radius:8px;
  margin-bottom:15px;
  font-size:18px;
}
textarea{
  width:100%;
  height:180px;
  font-size:20px;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
}
textarea:focus{outline:3px solid #2f6f95;}
button{
  background:#2f6f95;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:8px;
  font-size:18px;
  cursor:pointer;
  margin-top:12px;
  margin-right:10px;
}
button:hover{background:#245b79;}
.feedback{
  margin-top:18px;
  padding:15px;
  border-radius:8px;
  background:#f0f4f7;
  font-size:18px;
}
.good{color:#2c9c59;font-weight:bold;}
.warn{color:#c47a00;}
.error{color:#b30000;}
.rule{margin-top:10px;font-weight:bold;}
.diktatSentence{font-size:22px;font-weight:bold;margin:10px 0;}
</style>
</head>
<body>

<header>
✏️ Satzwerkstatt – Schreiben üben (3./4. Klasse)
</header>

<div class="container">

<div class="panel">
<h2>1. Text schreiben</h2>
<div class="instructions">
Schreibe eine kurze Geschichte.<br>
Drücke danach auf <b>Text prüfen</b>.
</div>
<textarea id="textInput" placeholder="Heute ging ich in den Wald..."></textarea>
<br>
<button onclick="runCheck()">Text prüfen</button>
<button onclick="clearText()">Text löschen</button>
<div id="feedback" class="feedback"></div>
</div>

<div class="panel">
<h2>2. Diktat üben</h2>
<div class="instructions">
1. Klicke einmal auf die Seite (Audio aktivieren)<br>
2. Höre den Satz Wort für Wort<br>
3. Schreibe ihn auf<br>
4. Prüfe dein Diktat
</div>
<div id="diktatDisplay" class="diktatSentence">Klicke auf „Neues Diktat“</div>
<button onclick="newDiktat()">Neues Diktat</button>
<button id="playButton" onclick="playDiktat()" disabled>🔊 Satz hören</button>
<textarea id="diktatInput" placeholder="Schreibe den Satz hier..."></textarea>
<br>
<button onclick="checkDiktat()">Diktat prüfen</button>
<div id="diktatFeedback" class="feedback"></div>
</div>

</div>

<script>
/* ---------- Textprüfung ---------- */
function clearText(){
  document.getElementById("textInput").value="";
  document.getElementById("feedback").innerHTML="";
}

function runCheck(){
  let text=document.getElementById("textInput").value.trim();
  if(text.length<10){
    document.getElementById("feedback").innerHTML="<span class='warn'>Bitte schreibe mehr Text.</span>";
    return;
  }
  let feedback="";
  let sentences=text.split(/[.!?]/).map(s=>s.trim()).filter(s=>s.length>0);

  feedback+="<div class='rule'>Satzanfang groß</div>";
  sentences.forEach(s=>{
    let first=s.match(/[A-Za-zÄÖÜäöüß]/);
    if(first && first[0]!==first[0].toUpperCase()){
      feedback+="<div class='warn'>Ein Satz beginnt klein: '"+s+"'</div>";
    }
  });

  feedback+="<div class='rule'>Satzende</div>";
  if(!text.match(/[.!?]$/)){
    feedback+="<div class='warn'>Am Ende fehlt ein Punkt.</div>";
  }else{feedback+="<div class='good'>Satzende vorhanden.</div>";}

  feedback+="<div class='rule'>Doppelte Wörter</div>";
  let words=text.toLowerCase().split(/\s+/);
  for(let i=0;i<words.length;i++){
    if(words[i]===words[i+1]){
      feedback+="<div class='warn'>Doppeltes Wort: "+words[i]+"</div>";
    }
  }

  feedback+="<div class='rule'>Sehr lange Sätze</div>";
  sentences.forEach(s=>{
    if(s.split(" ").length>15){
      feedback+="<div class='warn'>Sehr langer Satz: "+s+"</div>";
    }
  });

  feedback+="<div class='rule'>Nomen groß schreiben</div>";
  let nouns=["hund","katze","haus","wald","baum","freund","schule","garten"];
  words.forEach(w=>{
    if(nouns.includes(w)){
      feedback+="<div class='warn'>Nomen groß schreiben: "+w+"</div>";
    }
  });

  feedback+="<div class='rule'>das oder dass</div>";
  if(text.includes("dass das")){feedback+="<div class='warn'>Überprüfe: dass / das</div>";}

  feedback+="<div class='rule'>Viele 'und'</div>";
  let undCount=(text.match(/\bund\b/g)||[]).length;
  if(undCount>=3){feedback+="<div class='warn'>Du benutzt oft 'und'.</div>";}

  feedback+="<div class='rule'>Rechtschreibung</div>";
  let mistakes=[];
  words.forEach(w=>{if(w.length>9) mistakes.push(w);});
  mistakes=[...new Set(mistakes)];
  if(mistakes.length>0){
    feedback+="<div class='warn'>Überprüfe diese Wörter:</div>"+mistakes.join(", ");
  }else{feedback+="<div class='good'>Keine auffälligen Fehler.</div>";}

  document.getElementById("feedback").innerHTML=feedback;
}

/* ---------- Diktat ---------- */
let currentDiktat="";
const diktate=[
  "Der kleine Hund läuft durch den Wald.",
  "Das Mädchen hört ein Geräusch im Garten.",
  "Der Junge findet einen Schatz.",
  "Plötzlich fliegt ein Vogel über das Haus.",
  "Am Morgen geht die Katze in den Garten."
];

let germanVoice=null;
document.body.addEventListener("click",()=>{
  const voices=speechSynthesis.getVoices();
  germanVoice=voices.find(v=>v.lang.startsWith("de"))||voices[0];
  document.getElementById("playButton").disabled=false;
},{once:true});

function newDiktat(){
  currentDiktat=diktate[Math.floor(Math.random()*diktate.length)];
  document.getElementById("diktatDisplay").innerText="Höre den Satz Wort für Wort.";
  document.getElementById("diktatInput").value="";
  document.getElementById("diktatFeedback").innerHTML="";
}

function playDiktat(){
  if(!currentDiktat) return;
  if(!germanVoice){setTimeout(playDiktat,100); return;}
  const words=currentDiktat.split(" ");
  let delay=0;
  words.forEach(word=>{
    setTimeout(()=>{
      let utter=new SpeechSynthesisUtterance(word);
      utter.voice=germanVoice;
      utter.lang="de-DE";
      utter.rate=0.7;
      utter.pitch=1;
      speechSynthesis.speak(utter);
    }, delay);
    delay+=800; // 800ms pause between words
  });
}

function checkDiktat(){
  let input=document.getElementById("diktatInput").value.trim();
  if(!input){document.getElementById("diktatFeedback").innerHTML="<span class='warn'>Bitte schreibe den Satz.</span>"; return;}
  let inputWords=input.split(" ");
  let correctWords=currentDiktat.split(" ");
  let result="";
  correctWords.forEach((w,i)=>{
    if(inputWords[i]!==w){result+="Fehler bei Wort "+(i+1)+": "+w+"<br>";}
  });
  if(result==="") result="<span class='good'>Sehr gut! Alles richtig.</span>";
  document.getElementById("diktatFeedback").innerHTML=result;
}
</script>

</body>
</html>
