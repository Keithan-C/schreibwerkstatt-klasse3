<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<style>

</head>

<body>

<header>
✏️ Satzwerkstatt – Schreiben prüfen (Klasse 3/4)
</header>

<div class="container">

<div class="panel">

<h2>1 Schreiben</h2>

<textarea id="textInput" placeholder="Schreibe hier deine Geschichte..."></textarea>

<button onclick="runCheck()">Text prüfen</button>

<div id="feedback" class="feedback"></div>

</div>



<div class="panel">

<h2>2 Diktat üben</h2>

<div id="diktatDisplay">Klicke auf "Neues Diktat".</div>

<button onclick="newDiktat()">Neues Diktat</button>
<button onclick="playDiktat()">🔊 Anhören</button>

<textarea id="diktatInput" placeholder="Schreibe den Satz hier..."></textarea>

<button onclick="checkDiktat()">Diktat prüfen</button>

<div id="diktatFeedback" class="feedback"></div>

</div>

</div>



<script>

const commonWords = [
"der","die","das","ein","eine","und","ich","du","er","sie","es",
"wir","ging","sah","kam","lief","war","hatte","haus","hund",
"katze","wald","baum","kind","spiel","gingen","waren","hatten",
"gehen","sehen","laufen","spielen","mädchen","freund","freundin"
];

function runCheck(){

let text=document.getElementById("textInput").value.trim();

let feedback="";

if(text.length<10){

feedback="Bitte schreibe einen längeren Text.";

document.getElementById("feedback").innerHTML=feedback;

return;

}

let sentences=text
.split(/[.!?]/)
.map(s=>s.trim())
.filter(s=>s.length>0);


feedback+="<div class='step'>Schritt 1: Satzanfänge</div>";

sentences.forEach(s=>{

let first=s.match(/[A-Za-zÄÖÜäöüß]/);

if(first && first[0]!==first[0].toUpperCase()){

feedback+="<div class='warn'>Satzanfang klein: "+s+"</div>";

}

});



feedback+="<div class='step'>Schritt 2: Satzzeichen</div>";

if(!text.match(/[.!?]$/)){

feedback+="<div class='warn'>Am Ende fehlt ein Punkt.</div>";

}else{

feedback+="<div class='good'>Satzende vorhanden.</div>";

}



feedback+="<div class='step'>Schritt 3: Wortwiederholungen</div>";

let starts={};

sentences.forEach(s=>{

let word=s.split(" ")[0].toLowerCase();

starts[word]=(starts[word]||0)+1;

});

for(let w in starts){

if(starts[w]>=3){

feedback+="<div class='warn'>Viele Sätze beginnen mit '"+w+"'.</div>";

}

}



feedback+="<div class='step'>Schritt 4: mögliche Rechtschreibfehler</div>";

let words=text.toLowerCase().match(/\b[\wäöüß]+\b/g);

let errors=[];

words.forEach(w=>{

if(!commonWords.includes(w) && w.length>4){

errors.push(w);

}

});

errors=[...new Set(errors)];

if(errors.length>0){

feedback+="<div class='warn'>Überprüfe diese Wörter:</div>";

feedback+=errors.join(", ");

}else{

feedback+="<div class='good'>Keine offensichtlichen Fehler gefunden.</div>";

}



document.getElementById("feedback").innerHTML=feedback;

}



const diktate=[

"Plötzlich lief der kleine Hund in den Wald.",
"Am Morgen hörte das Mädchen ein Geräusch.",
"Der mutige Ritter kämpfte gegen den Drachen.",
"Langsam ging die Katze über den Zaun."

];

let currentDiktat="";

function newDiktat(){

currentDiktat=diktate[Math.floor(Math.random()*diktate.length)];

document.getElementById("diktatDisplay").innerText="Höre den Satz.";

document.getElementById("diktatInput").value="";

document.getElementById("diktatFeedback").innerHTML="";

}



function playDiktat(){

let speech=new SpeechSynthesisUtterance(currentDiktat);

speech.lang="de-DE";

speech.rate=0.8;

speechSynthesis.speak(speech);

}



function checkDiktat(){

let input=document.getElementById("diktatInput").value.trim();

let correct=currentDiktat;

let result="";

if(!input){

result="Bitte schreibe den Satz.";

document.getElementById("diktatFeedback").innerHTML=result;

return;

}

let inputWords=input.split(" ");

let correctWords=correct.split(" ");

correctWords.forEach((word,i)=>{

if(inputWords[i]!==word){

result+="Fehler bei Wort "+(i+1)+": "+word+"<br>";

}

});

if(result===""){

result="<span class='good'>Perfekt geschrieben!</span>";

}

document.getElementById("diktatFeedback").innerHTML=result;

}

</script>

</body>
</html>
