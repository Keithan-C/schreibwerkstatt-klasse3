<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satzwerkstatt</title>

<style>
body { font-family: Arial; background:#f4f6fb; padding:20px; }
.container { max-width:900px; margin:auto; }
.card { background:white; padding:20px; border-radius:12px; margin-bottom:20px; }

.structure { display:flex; justify-content:space-around; background:#eef6ff; padding:10px; border-radius:10px; }

.sentence-box { font-size:22px; border:2px dashed #ccc; padding:10px; margin:15px 0; }

.word-group { display:flex; flex-wrap:wrap; gap:8px; }
.word { padding:10px; border:1px solid #ccc; border-radius:8px; cursor:pointer; }
.word.selected { background:#dbeafe; }

.btn { padding:10px; margin-top:10px; border:none; border-radius:8px; background:#4caf50; color:white; cursor:pointer; }

.feedback { margin-top:10px; font-weight:bold; }
.ok { color:green; }
.warn { color:red; }

.correction-box {
  border:2px solid #ddd;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Satz bauen</h2>

<div class="structure">
<div>👤 Wer</div>
<div>⚡ Verb</div>
<div>📍 Wo</div>
</div>

<div id="sentence" class="sentence-box">___ ___ ___</div>

<h3>Wer?</h3>
<div id="wer" class="word-group"></div>

<h3>Verb</h3>
<div id="verb" class="word-group"></div>

<h3>Wo?</h3>
<div id="wo" class="word-group"></div>

<button class="btn" onclick="checkSentence()">Prüfen</button>
<div id="feedback" class="feedback"></div>

</div>

<div class="card">
<h2>Eigener Satz</h2>

<input id="customInput" type="text" placeholder="z.B. der hund im park" style="width:100%; padding:10px">

<button class="btn" onclick="analyzeSentence()">Prüfen & Verbessern</button>

<div id="customFeedback" class="feedback"></div>

<div id="correctionArea" class="correction-box" style="display:none;"></div>

</div>

</div>

<script>
let state = {wer:"", verb:"", wo:""};

const data = {
wer:["Der Hund","Die Katze","Das Mädchen","Der Junge"],
verb:["läuft","rennt","geht","spielt"],
wo:["im Park","im Garten","im Wald","in der Schule"]
};

function render(){
  renderGroup("wer", data.wer);
  renderGroup("verb", data.verb);
  renderGroup("wo", data.wo);
}

function renderGroup(id, arr){
  document.getElementById(id).innerHTML =
    arr.map(w=>`<button class="word" onclick="select('${id}','${w}')">${w}</button>`).join("");
}

function select(type,value){
  state[type]=value;
  updateSentence();
}

function updateSentence(){
  document.getElementById("sentence").innerText =
    `${state.wer||"___"} ${state.verb||"___"} ${state.wo||"___"}`;
}

function checkSentence(){
  const fb = document.getElementById("feedback");
  if(!state.wer) return fb.innerHTML="Wer fehlt";
  if(!state.verb) return fb.innerHTML="Verb fehlt";
  if(!state.wo) return fb.innerHTML="Ort fehlt";

  fb.innerHTML="<span class='ok'>Super!</span>";
}


// ==========================
// INTERACTIVE CORRECTION
// ==========================

let currentWords = [];

function analyzeSentence(){
  const text = document.getElementById("customInput").value.trim();
  const fb = document.getElementById("customFeedback");
  const area = document.getElementById("correctionArea");

  if(!text){
    fb.innerHTML="⚠ Bitte Satz eingeben";
    return;
  }

  currentWords = text.replace(/[.,!?]/g,'').split(/\s+/);

  let errors = [];

  // Verb check
  const verbs = ["läuft","rennt","geht","spielt","ist","hat"];
  let verbIndex = currentWords.findIndex(w=>verbs.includes(w.toLowerCase()));

  if(verbIndex === -1){
    errors.push("Verb fehlt");
  }

  if(currentWords[0][0] !== currentWords[0][0].toUpperCase()){
    errors.push("Satzanfang groß");
  }

  if(verbIndex !== -1 && verbIndex !== 1){
    errors.push("Verb an 2. Stelle");
  }

  if(errors.length === 0){
    fb.innerHTML="<span class='ok'>✅ Sehr gut!</span>";
    area.style.display="none";
    return;
  }

  fb.innerHTML = "⚠ Fehler gefunden: " + errors.join(", ");
  area.style.display="block";

  buildCorrectionUI(errors);
}


function buildCorrectionUI(errors){
  const area = document.getElementById("correctionArea");

  let html = "<h3>Verbessere den Satz:</h3>";

  // Step 1: Capital
  if(errors.includes("Satzanfang groß")){
    html += `
      <p>👉 Mache den ersten Buchstaben groß:</p>
      <button onclick="fixCapital()">Großschreibung korrigieren</button>
    `;
  }

  // Step 2: Add verb
  if(errors.includes("Verb fehlt")){
    html += `
      <p>👉 Füge ein Verb hinzu:</p>
      <button onclick="addVerb('läuft')">läuft</button>
      <button onclick="addVerb('rennt')">rennt</button>
    `;
  }

  // Step 3: Verb position
  if(errors.includes("Verb an 2. Stelle")){
    html += `
      <p>👉 Setze das Verb an die 2. Stelle:</p>
      <button onclick="fixVerbPosition()">Korrigieren</button>
    `;
  }

  html += `<p><b>Aktueller Satz:</b> <span id="liveSentence">${currentWords.join(" ")}</span></p>`;

  area.innerHTML = html;
}


function updateLive(){
  document.getElementById("liveSentence").innerText = currentWords.join(" ");
}


// FIX FUNCTIONS

function fixCapital(){
  currentWords[0] = currentWords[0].charAt(0).toUpperCase() + currentWords[0].slice(1);
  updateLive();
}

function addVerb(v){
  currentWords.splice(1,0,v);
  updateLive();
}

function fixVerbPosition(){
  const verbs = ["läuft","rennt","geht","spielt","ist","hat"];
  let i = currentWords.findIndex(w=>verbs.includes(w.toLowerCase()));

  if(i !== -1){
    const verb = currentWords[i];
    currentWords.splice(i,1);
    currentWords.splice(1,0,verb);
  }

  updateLive();
}

render();
</script>

</body>
</html>
