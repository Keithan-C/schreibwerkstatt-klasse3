<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Satzwerkstatt Klasse 3/4 Bayern</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--accent:#4caf50;--border:#e5e7eb;--muted:#6b7280}
body{font-family:Arial,sans-serif;background:var(--bg);margin:0;padding:16px}
.container{max-width:900px;margin:auto}
.card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px}
h1{margin:0 0 10px}
.structure{display:flex;justify-content:space-around;background:#eef6ff;padding:10px;border-radius:10px}
.sentence-box{font-size:22px;border:2px dashed var(--border);padding:10px;border-radius:10px;margin:10px 0}
.word-group{display:flex;flex-wrap:wrap;gap:6px}
.word{padding:10px;border:1px solid var(--border);border-radius:8px;cursor:pointer}
.word.selected{background:#dbeafe}
.btn{padding:10px;border:none;border-radius:8px;cursor:pointer;margin-top:10px}
.primary{background:var(--accent);color:white}
.feedback{margin-top:10px;font-weight:bold}
.ok{color:green}
.warn{color:red}
</style>
</head>
<body>
<div class="container">

<div class="card">
<h1>Satzwerkstatt (Bayern 3./4. Klasse)</h1>
<div class="structure">
<div>👤 Wer</div>
<div>⚡ Verb</div>
<div>📍 Wo</div>
</div>

<div class="sentence-box" id="sentence">___ ___ ___</div>

<h3>Wer?</h3>
<div class="word-group" id="wer"></div>

<h3>Verb</h3>
<div class="word-group" id="verb"></div>

<h3>Wo?</h3>
<div class="word-group" id="wo"></div>

<button class="btn primary" onclick="checkSentence()">Prüfen</button>
<div id="feedback" class="feedback"></div>
</div>

<div class="card">
<h2>Eigener Satz</h2>
<input id="customInput" type="text" placeholder="Der Hund läuft im Garten." style="width:100%;padding:10px">
<button class="btn primary" onclick="checkCustom()">Prüfen</button>
<div id="customFeedback" class="feedback"></div>
</div>

</div>

<script>
let state={wer:"",verb:"",wo:""};

// Bayern Grade 3/4 appropriate vocabulary (simple, repetitive, spelling patterns)
const data={
wer:["Der Hund","Die Katze","Der Junge","Das Mädchen","Der Lehrer"],
verb:["läuft","rennt","spielt","geht","springt"],
wo:["im Garten","im Wald","im Park","in der Schule","auf dem Spielplatz"]
};

function render(){
renderGroup("wer",data.wer);
renderGroup("verb",data.verb);
renderGroup("wo",data.wo);
updateSentence();
}

function renderGroup(id,arr){
const el=document.getElementById(id);
el.innerHTML=arr.map(w=>`<button class='word' onclick="select('${id}','${w}')">${w}</button>`).join("");
}

function select(type,value){
state[type]=value;
highlight(type,value);
updateSentence();
}

function highlight(type,value){
[...document.getElementById(type).children].forEach(btn=>{
btn.classList.toggle("selected",btn.innerText===value);
});
}

function updateSentence(){
document.getElementById("sentence").innerText=
`${state.wer||"___"} ${state.verb||"___"} ${state.wo||"___"}`;
}

function checkSentence(){
const fb=document.getElementById("feedback");
if(!state.wer) return fb.innerHTML="<span class='warn'>Wer fehlt</span>";
if(!state.verb) return fb.innerHTML="<span class='warn'>Verb fehlt</span>";
if(!state.wo) return fb.innerHTML="<span class='warn'>Ort fehlt</span>";

fb.innerHTML="<span class='ok'>Super! Richtiger Satz.</span>";
}

// --- Custom sentence check ---
function checkCustom(){
const text=document.getElementById("customInput").value.trim();
const fb=document.getElementById("customFeedback");

if(!text) return fb.innerHTML="<span class='warn'>Bitte Satz eingeben</span>";

const words=text.split(" ");

// common verbs (grade 3/4 level)
const verbs=["läuft","rennt","geht","spielt","springt","ist","hat"];

const hasVerb=words.some(w=>verbs.includes(w.toLowerCase()));

if(words.length<2) return fb.innerHTML="<span class='warn'>Zu kurz</span>";
if(!hasVerb) return fb.innerHTML="<span class='warn'>Kein Verb gefunden</span>";

// simple spelling check (double consonants / ie)
if(text.includes("ie")||text.match(/(ll|nn|tt)/)){
fb.innerHTML="<span class='ok'>Gut! Satz + richtige Schreibmuster erkannt.</span>";
}else{
fb.innerHTML="<span class='ok'>Guter Satz! Achte auch auf Schreibregeln (ie, doppelte Konsonanten).</span>";
}
}

render();
</script>

</body>
</html>
