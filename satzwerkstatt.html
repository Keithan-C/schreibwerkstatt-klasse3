<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satzwerkstatt ✏️</title>
<!-- Google Fonts loaded after GDPR consent via gdpr.js -->
<style>
/* ── RESET & TOKENS ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue:   #4f6ef7; --blue-lt: #eef0ff;
  --green:  #16a34a; --green-bg:#f0fdf4; --green-mid:#86efac;
  --amber:  #d97706; --amber-bg:#fffbeb; --amber-mid:#fcd34d;
  --red:    #dc2626; --red-bg:  #fef2f2; --red-mid:  #fca5a5;
  --purple: #7c3aed; --purple-bg:#faf5ff; --purple-mid:#c4b5fd;
  --surface:#ffffff; --bg:#f2f5ff; --text:#1a1f36; --muted:#64748b;
  --border: #e0e7f0;
  --radius: 18px; --radius-sm: 10px;
  --shadow: 0 2px 16px rgba(79,110,247,.09);
  --shadow-md: 0 6px 28px rgba(79,110,247,.13);
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  background: linear-gradient(135deg, #1a1a2e, #2d2d5e);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
.topbar-title {
  font-family: 'Baloo 2', sans-serif;
  font-size: clamp(1rem, 2.5vw, 1.25rem);
  font-weight: 800;
  color: #fff;
}
.topbar-links { display: flex; gap: 8px; flex-wrap: wrap; }
.tlink {
  font-size: .8rem; font-weight: 700;
  padding: 6px 14px; border-radius: 40px;
  border: 1.5px solid rgba(255,255,255,.3);
  color: rgba(255,255,255,.85);
  text-decoration: none; background: rgba(255,255,255,.1);
  transition: all .2s;
}
.tlink:hover { background: rgba(255,255,255,.22); color: #fff; }

/* ── PAGE WRAPPER ── */
.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 32px 16px 60px;
  display: flex; flex-direction: column; gap: 24px;
}

/* ── SECTION CARD ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-hd {
  padding: 18px 22px 14px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.card-icon { font-size: 1.6rem; }
.card-title {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.2rem; font-weight: 800;
  color: var(--text);
}
.card-sub { font-size: .82rem; font-weight: 600; color: var(--muted); margin-top: 1px; }
.card-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }

/* ── TEXTAREA ── */
.s-ta {
  width: 100%; min-height: 110px;
  border: 2.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 14px 16px; resize: none;
  font-family: 'Nunito', sans-serif;
  font-size: 1.05rem; font-weight: 600;
  color: var(--text); line-height: 1.7;
  background: #fafcff; outline: none;
  transition: border-color .2s;
  spellcheck: true;
}
.s-ta:focus { border-color: var(--blue); background: #fff; }
.s-ta::placeholder { color: #b0bcda; font-weight: 500; }

/* ── BUTTON ROW ── */
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  display: flex; align-items: center; gap: 6px;
  border: none; border-radius: 40px; padding: 10px 20px;
  font-size: .92rem; font-weight: 700; cursor: pointer;
  font-family: 'Nunito', sans-serif; transition: all .2s;
}
.btn-primary { background: var(--blue); color: #fff; box-shadow: 0 3px 10px rgba(79,110,247,.25); }
.btn-primary:hover { background: #3a55e0; transform: translateY(-1px); }
.btn-primary:disabled { opacity: .55; cursor: wait; transform: none; }
.btn-outline { background: none; border: 2px solid var(--border); color: var(--muted); }
.btn-outline:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }

/* ── ASSESSMENT PANEL ── */
.assess {
  border-radius: var(--radius-sm);
  overflow: hidden;
  animation: fadeUp .25s ease;
  border: 2px solid var(--border);
}
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.assess-head {
  padding: 12px 16px;
  font-family: 'Baloo 2', sans-serif;
  font-size: .92rem; font-weight: 800;
  background: var(--bg);
  border-bottom: 2px solid var(--border);
}

.checks-list { display: flex; flex-direction: column; }
.check-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: .9rem; font-weight: 600;
}
.check-row:last-child { border-bottom: none; }
.check-icon {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 900; flex-shrink: 0; margin-top: 1px;
}
.check-ok   { background: var(--green-bg); color: var(--green); border: 2px solid var(--green-mid); }
.check-warn { background: var(--amber-bg); color: var(--amber); border: 2px solid var(--amber-mid); }
.check-info { background: var(--blue-lt);  color: var(--blue);  border: 2px solid #a5b4fc; }

/* grammar/spelling corrections sub-section */
.lt-section {
  background: #fffbeb;
  border-top: 2px solid var(--amber-mid);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.lt-head {
  font-family: 'Baloo 2', sans-serif;
  font-size: .88rem; font-weight: 800; color: var(--text);
}
.lt-list { display: flex; flex-direction: column; gap: 6px; }
.lt-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  background: var(--surface); border-radius: 8px;
  padding: 6px 10px; border: 1.5px solid var(--border);
}
.lt-wrong { color: var(--red); font-weight: 700; font-size: .88rem; text-decoration: line-through; }
.lt-arrow { color: var(--muted); font-size: .85rem; }
.lt-sugs  { display: flex; gap: 5px; flex-wrap: wrap; }
.lt-sug {
  background: var(--green-bg); border: 2px solid var(--green-mid);
  color: var(--green); border-radius: 20px; padding: 3px 11px;
  font-size: .82rem; font-weight: 700; cursor: pointer;
  font-family: 'Nunito', sans-serif; transition: all .18s;
}
.lt-sug:hover { background: var(--green); color: #fff; }
.lt-fixall {
  background: var(--green); color: #fff;
  border: none; border-radius: 20px; padding: 8px 18px;
  font-size: .85rem; font-weight: 700; cursor: pointer;
  font-family: 'Nunito', sans-serif; transition: background .2s;
  align-self: flex-start;
}
.lt-fixall:hover { background: #15803d; }

/* overall verdict */
.verdict {
  padding: 14px 16px;
  border-top: 2px solid var(--border);
  font-family: 'Baloo 2', sans-serif;
  font-size: 1rem; font-weight: 800;
  display: flex; align-items: center; gap: 8px;
}
.verdict.v-great  { background: var(--green-bg);  color: var(--green); }
.verdict.v-good   { background: var(--amber-bg);  color: var(--amber); }
.verdict.v-keep   { background: var(--red-bg);    color: var(--red); }

/* ── DRAG & DROP ── */
.dnd-label {
  font-family: 'Baloo 2', sans-serif;
  font-size: .88rem; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 6px;
}
.word-pool, .sentence-area {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 12px; border: 2.5px dashed var(--border);
  min-height: 56px; border-radius: var(--radius-sm);
  transition: border-color .2s;
}
.word-pool.over, .sentence-area.over { border-color: var(--blue); background: var(--blue-lt); }
.word-block {
  background: var(--blue); color: #fff;
  padding: 7px 14px; border-radius: 40px;
  cursor: grab; user-select: none;
  font-size: .9rem; font-weight: 700;
  font-family: 'Nunito', sans-serif;
  transition: opacity .15s, transform .15s;
  box-shadow: 0 2px 8px rgba(79,110,247,.25);
}
.word-block:hover { transform: translateY(-2px); }
.word-block.dragging { opacity: .45; }
.block-feedback {
  font-size: .9rem; font-weight: 700; padding: 10px 0;
  color: var(--green);
}

/* ── SPINNER ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; animation: spin .8s linear infinite; }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-title">✏️ Satzwerkstatt</div>
  <nav class="topbar-links">
    <a class="tlink" href="index.html">📖 Blockwelt</a>
    <a class="tlink" href="story.html">📝 Schreibwerkstatt</a>
    <a class="tlink" href="builder.html">🧱 Baukasten</a>
  </nav>
</header>

<div class="page">

  <!-- ── DEIN SATZ ── -->
  <div class="card">
    <div class="card-hd">
      <span class="card-icon">🖊️</span>
      <div>
        <div class="card-title">Dein Satz</div>
        <div class="card-sub">Schreibe irgendeinen Satz – ich prüfe ihn für dich!</div>
      </div>
    </div>
    <div class="card-body">
      <textarea class="s-ta" id="satz" spellcheck="true"
        placeholder="Schreibe hier deinen Satz …"
        oninput="clearAssess()"></textarea>

      <div class="btn-row">
        <button class="btn btn-primary" id="checkBtn" onclick="checkSentence()">
          🔍 Satz prüfen
        </button>
        <button class="btn btn-outline" onclick="speakSentence()">
          🔊 Vorlesen
        </button>
      </div>

      <!-- Assessment panel (hidden until check is run) -->
      <div id="assess" style="display:none" class="assess">
        <div class="assess-head" id="assess-head">📋 Meine Prüfung</div>
        <div class="checks-list" id="checks-list"></div>
        <div id="lt-section" style="display:none" class="lt-section">
          <div class="lt-head" id="lt-head"></div>
          <div class="lt-list" id="lt-list"></div>
          <button class="lt-fixall" id="lt-fixall" onclick="applyAllLT()" style="display:none">
            ✨ Alle auf einmal korrigieren
          </button>
        </div>
        <div class="verdict" id="verdict"></div>
      </div>
    </div>
  </div>

  <!-- ── SATZBAU MIT BLÖCKEN ── -->
  <div class="card">
    <div class="card-hd">
      <span class="card-icon">🧩</span>
      <div>
        <div class="card-title">Satzbau mit Blöcken</div>
        <div class="card-sub">Ziehe die Wörter in die richtige Reihenfolge</div>
      </div>
    </div>
    <div class="card-body">
      <div>
        <div class="dnd-label">Wörter</div>
        <div class="word-pool" id="wordPool"></div>
      </div>
      <div>
        <div class="dnd-label">Dein Satz</div>
        <div class="sentence-area" id="sentenceArea"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="checkBlockSentence()">🔍 Prüfen</button>
        <button class="btn btn-outline" onclick="resetBlocks()">🔄 Zurücksetzen</button>
      </div>
      <div class="block-feedback" id="blockFeedback"></div>
    </div>
  </div>

</div><!-- /page -->

<script>
/* ════════════════════════════════════════
   DATA
════════════════════════════════════════ */
const BLOCK_SENTENCE = "Der Junge rennt schnell zur Gans im Park.";
const BLOCK_WORDS    = ["Der Junge","rennt","zur","Gans","schnell","im","Park"];

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let _ltMatches = []; // LanguageTool matches for current sentence

/* ════════════════════════════════════════
   SENTENCE CHECKER
════════════════════════════════════════ */
function clearAssess() {
  document.getElementById('assess').style.display = 'none';
  _ltMatches = [];
}

async function checkSentence() {
  const ta  = document.getElementById('satz');
  const btn = document.getElementById('checkBtn');
  const text = ta.value.trim();

  if (!text) {
    showAssess(['<div class="check-row"><span class="check-icon check-warn">!</span>Schreibe zuerst einen Satz.</div>'], '', 'v-keep', '✏️ Schreibe einen Satz!');
    return;
  }

  // ── Local structural checks ──────────────────────
  const checks = [];
  let structureOk = true;

  // Capital start
  if (text[0] === text[0].toUpperCase() && text[0] !== text[0].toLowerCase()) {
    checks.push(mkCheck('ok', '✓', 'Satzanfang ist großgeschrieben'));
  } else {
    checks.push(mkCheck('warn', '!', 'Beginne deinen Satz mit einem Großbuchstaben'));
    structureOk = false;
  }

  // Ends with period
  if (/[.!?]$/.test(text)) {
    checks.push(mkCheck('ok', '✓', 'Satzzeichen am Ende (' + text.slice(-1) + ')'));
  } else {
    checks.push(mkCheck('warn', '!', 'Dein Satz braucht ein Satzzeichen am Ende (. ! ?)'));
    structureOk = false;
  }

  // Word count
  const wc = text.split(/\s+/).filter(Boolean).length;
  if (wc >= 5) {
    checks.push(mkCheck('ok', '✓', `Gute Satzlänge – ${wc} Wörter`));
  } else {
    checks.push(mkCheck('warn', '!', `Dein Satz hat ${wc} Wörter – versuche 5 oder mehr`));
    structureOk = false;
  }

  // ── LanguageTool API ─────────────────────────────
  btn.innerHTML = '<span class="spinner">⏳</span> Prüfe …';
  btn.disabled = true;

  let ltOk = true;
  try {
    const resp = await fetch('https://api.languagetool.org/v2/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ text, language: 'de-DE' })
    });
    if (!resp.ok) throw new Error();
    const data = await resp.json();

    _ltMatches = (data.matches || []).filter(m => m.replacements && m.replacements.length > 0);

    if (_ltMatches.length === 0) {
      checks.push(mkCheck('ok', '✓', 'Keine Rechtschreib- oder Grammatikfehler'));
    } else {
      ltOk = false;
      checks.push(mkCheck('warn', '!', `${_ltMatches.length} Rechtschreib- oder Grammatikvorschlag${_ltMatches.length > 1 ? 'e' : ''} gefunden`));
    }
  } catch(e) {
    checks.push(mkCheck('info', 'i', 'Grammatikprüfung nicht verfügbar (offline?)'));
  } finally {
    btn.innerHTML = '🔍 Satz prüfen';
    btn.disabled = false;
  }

  // ── Verdict ──────────────────────────────────────
  let vClass, vText;
  if (structureOk && ltOk) {
    vClass = 'v-great'; vText = '🌟 Perfekt! Dein Satz ist super!';
  } else if (structureOk && !ltOk) {
    vClass = 'v-good';  vText = '👍 Fast perfekt! Schau dir die Vorschläge an.';
  } else {
    vClass = 'v-keep';  vText = '💪 Guter Anfang! Verbessere die markierten Punkte.';
  }

  showAssess(checks, _ltMatches, vClass, vText);
}

function mkCheck(type, icon, text) {
  return `<div class="check-row">
    <span class="check-icon check-${type}">${icon}</span>
    <span>${text}</span>
  </div>`;
}

function showAssess(checks, ltMatches, vClass, vText) {
  document.getElementById('checks-list').innerHTML = checks.join('');

  const ltSec  = document.getElementById('lt-section');
  const ltHead = document.getElementById('lt-head');
  const ltList = document.getElementById('lt-list');
  const ltFix  = document.getElementById('lt-fixall');
  const ta     = document.getElementById('satz');

  if (Array.isArray(ltMatches) && ltMatches.length > 0) {
    ltHead.textContent = `✏️ ${ltMatches.length} Verbesserungsvorschlag${ltMatches.length > 1 ? 'e' : ''}:`;
    ltList.innerHTML = ltMatches.map((m, i) => {
      const wrong = ta.value.substring(m.offset, m.offset + m.length);
      const sugs  = m.replacements.slice(0, 3).map(r => r.value);
      const btns  = sugs.map(s =>
        `<button class="lt-sug" onclick="applyOneLT(${i},'${escAttr(s)}')">${escHtml(s)}</button>`
      ).join('');
      return `<div class="lt-row">
        <span class="lt-wrong">${escHtml(wrong)}</span>
        <span class="lt-arrow">→</span>
        <span class="lt-sugs">${btns}</span>
      </div>`;
    }).join('');
    ltFix.style.display = ltMatches.length > 1 ? 'inline-block' : 'none';
    ltSec.style.display = 'flex';
  } else {
    ltSec.style.display = 'none';
  }

  const v = document.getElementById('verdict');
  v.className = `verdict ${vClass}`;
  v.textContent = vText;

  document.getElementById('assess').style.display = 'block';
  document.getElementById('assess').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ── Apply single LT suggestion ── */
function applyOneLT(idx, replacement) {
  const ta = document.getElementById('satz');
  const m  = _ltMatches[idx];
  if (!m) return;
  ta.value = ta.value.substring(0, m.offset) + replacement + ta.value.substring(m.offset + m.length);
  checkSentence(); // re-run full check
}

/* ── Apply all LT suggestions (end→start) ── */
function applyAllLT() {
  const ta = document.getElementById('satz');
  const sorted = [..._ltMatches].sort((a, b) => b.offset - a.offset);
  let text = ta.value;
  sorted.forEach(m => {
    if (m.replacements.length > 0) {
      text = text.substring(0, m.offset) + m.replacements[0].value + text.substring(m.offset + m.length);
    }
  });
  ta.value = text;
  checkSentence();
}

function speakSentence() {
  const text = document.getElementById('satz').value.trim();
  if (!text || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE'; u.rate = 0.9;
  speechSynthesis.speak(u);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

/* ════════════════════════════════════════
   DRAG & DROP BLOCKS
════════════════════════════════════════ */
const pool = document.getElementById('wordPool');
const area = document.getElementById('sentenceArea');
let dragged = null;

function buildBlocks() {
  pool.innerHTML = '';
  // Shuffle words for the puzzle
  const shuffled = [...BLOCK_WORDS].sort(() => Math.random() - .5);
  shuffled.forEach(w => pool.appendChild(makeBlock(w)));
}

function makeBlock(text) {
  const d = document.createElement('div');
  d.className   = 'word-block';
  d.draggable   = true;
  d.textContent = text;
  return d;
}

function resetBlocks() {
  pool.innerHTML = '';
  area.innerHTML = '';
  document.getElementById('blockFeedback').textContent = '';
  buildBlocks();
}

// Drag events
document.addEventListener('dragstart', e => {
  if (e.target.classList.contains('word-block')) {
    dragged = e.target;
    dragged.classList.add('dragging');
  }
});
document.addEventListener('dragend', e => {
  if (dragged) { dragged.classList.remove('dragging'); dragged = null; }
});

[pool, area].forEach(el => {
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('over'); });
  el.addEventListener('dragleave', () => el.classList.remove('over'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('over');
    if (dragged) el.appendChild(dragged);
  });
});

function checkBlockSentence() {
  const blocks   = area.querySelectorAll('.word-block');
  const fb       = document.getElementById('blockFeedback');
  if (!blocks.length) {
    fb.style.color = 'var(--amber)';
    fb.textContent = '⚠ Ziehe zuerst Wörter in die Satzfläche!';
    return;
  }
  const built = Array.from(blocks).map(b => b.textContent).join(' ') + '.';
  if (built.trim() === BLOCK_SENTENCE.trim()) {
    fb.style.color = 'var(--green)';
    fb.textContent = '🌟 Richtig! Perfekter Satz!';
  } else {
    fb.style.color = 'var(--amber)';
    fb.textContent = '🔄 Noch nicht ganz richtig – versuche es nochmal!';
  }
}

// Init blocks on load
buildBlocks();
</script>
<script>window._SW_FONTS_URL='https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@500;600;700;800&display=swap';</script>
<script src="gdpr.js"></script>
