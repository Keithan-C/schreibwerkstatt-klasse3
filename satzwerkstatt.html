<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satzwerkstatt ✏️</title>

<style>

/* ── RESET & TOKENS ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
--blue:#4f6ef7;
--blue-lt:#eef0ff;
--green:#16a34a;
--green-bg:#f0fdf4;
--green-mid:#86efac;
--amber:#d97706;
--amber-bg:#fffbeb;
--amber-mid:#fcd34d;
--red:#dc2626;
--red-bg:#fef2f2;
--surface:#ffffff;
--bg:#f2f5ff;
--text:#1a1f36;
--muted:#64748b;
--border:#e0e7f0;
--radius:18px;
--radius-sm:10px;
--shadow:0 2px 16px rgba(79,110,247,.09)
}

body{
font-family:Nunito,sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh
}

/* TOPBAR */

.topbar{
background:linear-gradient(135deg,#1a1a2e,#2d2d5e);
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center
}

.topbar-title{
font-family:"Baloo 2";
font-weight:800;
color:#fff
}

.tlink{
font-size:.8rem;
padding:6px 14px;
border-radius:40px;
border:1px solid rgba(255,255,255,.3);
color:#fff;
text-decoration:none
}

/* PAGE */

.page{
max-width:860px;
margin:auto;
padding:32px 16px;
display:flex;
flex-direction:column;
gap:24px
}

/* CARD */

.card{
background:var(--surface);
border-radius:var(--radius);
box-shadow:var(--shadow);
overflow:hidden
}

.card-hd{
padding:18px 22px;
border-bottom:2px solid var(--border);
display:flex;
gap:10px;
align-items:center
}

.card-title{
font-family:"Baloo 2";
font-weight:800
}

.card-body{
padding:20px 22px;
display:flex;
flex-direction:column;
gap:14px
}

/* TEXTAREA */

.s-ta{
width:100%;
min-height:110px;
border:2px solid var(--border);
border-radius:var(--radius-sm);
padding:14px;
font-size:1rem;
resize:none
}

/* BUTTONS */

.btn-row{
display:flex;
gap:8px
}

.btn{
border:none;
border-radius:40px;
padding:10px 20px;
font-weight:700;
cursor:pointer
}

.btn-primary{
background:var(--blue);
color:#fff
}

.btn-outline{
border:2px solid var(--border);
background:none
}

/* CHECK PANEL */

.assess{
border-radius:var(--radius-sm);
border:2px solid var(--border);
overflow:hidden
}

.assess-head{
padding:10px;
font-family:"Baloo 2";
font-weight:800;
background:var(--bg)
}

.check-row{
display:flex;
gap:10px;
padding:10px;
border-bottom:1px solid var(--border)
}

.check-icon{
width:22px;
height:22px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:.8rem
}

.check-ok{background:var(--green-bg);color:var(--green)}
.check-warn{background:var(--amber-bg);color:var(--amber)}
.check-info{background:var(--blue-lt);color:var(--blue)}

.verdict{
padding:12px;
font-family:"Baloo 2";
font-weight:800
}

.v-great{background:var(--green-bg);color:var(--green)}
.v-good{background:var(--amber-bg);color:var(--amber)}
.v-keep{background:var(--red-bg);color:var(--red)}

.word-pool,.sentence-area{
display:flex;
flex-wrap:wrap;
gap:8px;
padding:12px;
border:2px dashed var(--border);
border-radius:var(--radius-sm);
min-height:50px
}

.word-block{
background:var(--blue);
color:#fff;
padding:6px 14px;
border-radius:40px;
cursor:grab;
font-weight:700
}

</style>
</head>
<body>

<header class="topbar">
<div class="topbar-title">✏️ Satzwerkstatt</div>
<nav>
<a class="tlink" href="index.html">📖 Blockwelt</a>
<a class="tlink" href="story.html">📝 Schreibwerkstatt</a>
<a class="tlink" href="builder.html">🧱 Baukasten</a>
</nav>
</header>

<div class="page">

<div class="card">

<div class="card-hd">
<div class="card-title">Dein Satz</div>
</div>

<div class="card-body">

<textarea id="satz" class="s-ta" placeholder="Schreibe hier deinen Satz …" oninput="clearAssess()"></textarea>

<div class="btn-row">
<button id="checkBtn" class="btn btn-primary" onclick="checkSentence()">🔍 Satz prüfen</button>
<button class="btn btn-outline" onclick="speakSentence()">🔊 Vorlesen</button>
</div>

<div id="assess" class="assess" style="display:none">

<div class="assess-head">📋 Meine Prüfung</div>

<div id="checks-list"></div>

<div id="lt-section" style="display:none">

<div id="lt-head"></div>
<div id="lt-list"></div>

<button id="lt-fixall" onclick="applyAllLT()">✨ Alle korrigieren</button>

</div>

<div id="verdict" class="verdict"></div>

</div>

</div>
</div>


<div class="card">

<div class="card-hd">
<div class="card-title">Satzbau mit Blöcken</div>
</div>

<div class="card-body">

<div id="blockCounter"></div>

<div>
<div>Wörter</div>
<div id="wordPool" class="word-pool"></div>
</div>

<div>
<div>Dein Satz</div>
<div id="sentenceArea" class="sentence-area"></div>
</div>

<div class="btn-row">
<button class="btn btn-primary" onclick="checkBlockSentence()">🔍 Prüfen</button>
<button class="btn btn-outline" onclick="resetBlocks()">🔀 Neu mischen</button>
<button class="btn btn-outline" onclick="skipBlock()">⏭ Überspringen</button>
</div>

<div id="blockFeedback"></div>

</div>
</div>

</div>

<script>

/* STATE */

let _ltMatches=[]
let _lastCheckedSentence=""
let _lastResult=null


/* SENTENCE CHECK */

function clearAssess(){
document.getElementById("assess").style.display="none"
_lastCheckedSentence=""
_lastResult=null
}


async function checkSentence(){

const ta=document.getElementById("satz")
const text=ta.value.trim()

if(!text)return

if(text===_lastCheckedSentence&&_lastResult){
showAssess(_lastResult.checks,_lastResult.matches,_lastResult.vClass,_lastResult.vText)
return
}

_lastCheckedSentence=text

let checks=[]
let structureOk=true

if(text[0]===text[0].toUpperCase())checks.push(mkCheck("ok","✓","Satzanfang groß"))
else{checks.push(mkCheck("warn","!","Großbuchstabe fehlt"));structureOk=false}

if(/[.!?]$/.test(text))checks.push(mkCheck("ok","✓","Satzzeichen vorhanden"))
else{checks.push(mkCheck("warn","!","Satzzeichen fehlt"));structureOk=false}

try{

const resp=await fetch("https://api.languagetool.org/v2/check",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:new URLSearchParams({text,language:"de-DE"})
})

const data=await resp.json()

_ltMatches=data.matches||[]

}catch(e){

_ltMatches=localGrammarCheck(text)

}

let ltOk=_ltMatches.length===0

if(ltOk)checks.push(mkCheck("ok","✓","Keine Fehler gefunden"))
else checks.push(mkCheck("warn","!","Verbesserungen gefunden"))

let vClass="v-keep"
let vText="Verbessere deinen Satz"

if(structureOk&&ltOk){vClass="v-great";vText="Perfekt!"}
else if(structureOk){vClass="v-good";vText="Fast perfekt"}

_lastResult={checks,matches:_ltMatches,vClass,vText}

showAssess(checks,_ltMatches,vClass,vText)

}


function mkCheck(type,icon,text){
return `<div class="check-row"><span class="check-icon check-${type}">${icon}</span>${text}</div>`
}


function showAssess(checks,matches,vClass,vText){

document.getElementById("checks-list").innerHTML=checks.join("")

const ltSec=document.getElementById("lt-section")
const ltList=document.getElementById("lt-list")

if(matches.length){

ltList.innerHTML=matches.map((m,i)=>{

const wrong=document.getElementById("satz").value.substring(m.offset,m.offset+m.length)

const sugs=(m.replacements||[]).slice(0,3).map(r=>r.value)

const btns=sugs.map(s=>`<button class="lt-sug" data-idx="${i}" data-rep="${escAttr(s)}">${s}</button>`).join("")

return `<div>${wrong} → ${btns}</div>`

}).join("")

ltSec.style.display="block"

}else{

ltSec.style.display="none"

}

const v=document.getElementById("verdict")
v.className="verdict "+vClass
v.textContent=vText

document.getElementById("assess").style.display="block"

}


/* APPLY SUGGESTIONS */

document.addEventListener("click",function(e){

if(e.target.classList.contains("lt-sug")){

const idx=parseInt(e.target.dataset.idx)
const rep=e.target.dataset.rep

applyOneLT(idx,rep)

}

})


function applyOneLT(idx,replacement){

const ta=document.getElementById("satz")
const m=_ltMatches[idx]

if(!m)return

ta.value=ta.value.substring(0,m.offset)+replacement+ta.value.substring(m.offset+m.length)

checkSentence()

}


function applyAllLT(){

let ta=document.getElementById("satz")
let text=ta.value

const sorted=[..._ltMatches].sort((a,b)=>b.offset-a.offset)

sorted.forEach(m=>{
if(m.replacements&&m.replacements.length){
text=text.substring(0,m.offset)+m.replacements[0].value+text.substring(m.offset+m.length)
}
})

ta.value=text

checkSentence()

}


/* LOCAL FALLBACK */

function localGrammarCheck(text){

let issues=[]

if(text.includes("  ")){
issues.push({offset:text.indexOf("  "),length:2,replacements:[{value:" "}]} )
}

return issues

}


function escAttr(s){
return s.replace(/"/g,"&quot;")
}


/* SPEECH */

function speakSentence(){

const text=document.getElementById("satz").value

if(!text)return

let u=new SpeechSynthesisUtterance(text)
u.lang="de-DE"

speechSynthesis.speak(u)

}


/* BLOCK BUILDER */

const BLOCK_SENTENCES=[
{ s:"Die Sonne scheint hell am Himmel.", w:["Die Sonne","scheint","hell","am","Himmel"] },
{ s:"Wir spielen heute im Garten.", w:["Wir","spielen","heute","im","Garten"] }
]

let blockQueue=[]
let blockPos=0


function initQueue(){
blockQueue=BLOCK_SENTENCES.map((_,i)=>i).sort(()=>Math.random()-0.5)
blockPos=0
}


function currentEntry(){
if(blockPos>=blockQueue.length)initQueue()
return BLOCK_SENTENCES[blockQueue[blockPos]]
}


function buildBlocks(){

const entry=currentEntry()

const pool=document.getElementById("wordPool")
const area=document.getElementById("sentenceArea")

pool.innerHTML=""
area.innerHTML=""

entry.w.sort(()=>Math.random()-0.5).forEach(w=>{

let b=document.createElement("div")
b.className="word-block"
b.draggable=true
b.textContent=w

pool.appendChild(b)

})

}


function advanceBlock(){
blockPos++
if(blockPos>=blockQueue.length)initQueue()
buildBlocks()
}


function resetBlocks(){buildBlocks()}
function skipBlock(){advanceBlock()}


function checkBlockSentence(){

const blocks=[...document.querySelectorAll("#sentenceArea .word-block")]

let built=blocks.map(b=>b.textContent).join(" ")+"."

if(built===currentEntry().s){
document.getElementById("blockFeedback").textContent="Richtig!"
setTimeout(advanceBlock,1500)
}else{
document.getElementById("blockFeedback").textContent="Noch einmal versuchen."
}

}


initQueue()
buildBlocks()

</script>

</body>
</html>
