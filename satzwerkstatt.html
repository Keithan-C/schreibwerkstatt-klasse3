<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satzwerkstatt ✏️</title>
<!-- Google Fonts loaded after GDPR consent via gdpr.js -->
<style>
/* ── RESET & TOKENS ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--blue:#4f6ef7;--blue-lt:#eef0ff;
--green:#16a34a;--green-bg:#f0fdf4;--green-mid:#86efac;
--amber:#d97706;--amber-bg:#fffbeb;--amber-mid:#fcd34d;
--red:#dc2626;--red-bg:#fef2f2;
--surface:#ffffff;--bg:#f2f5ff;--text:#1a1f36;--muted:#64748b;--border:#e0e7f0;
--radius:18px;--radius-sm:10px;--shadow:0 2px 16px rgba(79,110,247,.09)
}
body{font-family:Nunito,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:linear-gradient(135deg,#1a1a2e,#2d2d5e);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.topbar-links{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.topbar-title{font-family:"Baloo 2";font-weight:800;color:#fff;font-size:1.2rem}
.tlink{font-size:.8rem;padding:6px 14px;border-radius:40px;border:1px solid rgba(255,255,255,.3);color:#fff;text-decoration:none;transition:all .2s}
.tlink:hover{background:rgba(255,255,255,.2);color:#fff}
.page{max-width:860px;margin:32px auto 60px;padding:0 16px;display:flex;flex-direction:column;gap:24px}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-hd{padding:18px 22px 14px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:10px}
.card-icon{font-size:1.6rem}
.card-title{font-family:'Baloo 2';font-size:1.2rem;font-weight:800;color:var(--text)}
.card-sub{font-size:.82rem;font-weight:600;color:var(--muted);margin-top:1px}
.card-body{padding:20px 22px;display:flex;flex-direction:column;gap:14px}
.s-ta{width:100%;min-height:110px;border:2.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;font-family:'Nunito';font-size:1.05rem;font-weight:600;color:var(--text);line-height:1.7;background:#fafcff;outline:none;transition:border-color .2s;resize:vertical}
.s-ta:focus{border-color:var(--blue);background:#fff}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:flex;align-items:center;gap:6px;border:none;border-radius:40px;padding:10px 20px;font-size:.92rem;font-weight:700;cursor:pointer;font-family:'Nunito';transition:all .2s}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 3px 10px rgba(79,110,247,.25)}
.btn-primary:hover{background:#3a55e0;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.55;cursor:wait;transform:none}
.btn-outline{background:none;border:2px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.assess{border-radius:var(--radius-sm);overflow:hidden;animation:fadeUp .25s ease;border:2px solid var(--border);display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.assess-head{padding:12px 16px;font-family:'Baloo 2';font-size:.92rem;font-weight:800;background:var(--bg);border-bottom:2px solid var(--border)}
.checks-list{display:flex;flex-direction:column}
.check-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:.9rem;font-weight:600}
.check-row:last-child{border-bottom:none}
.check-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;flex-shrink:0;margin-top:1px}
.check-ok{background:var(--green-bg);color:var(--green);border:2px solid var(--green-mid)}
.check-warn{background:var(--amber-bg);color:var(--amber);border:2px solid var(--amber-mid)}
.check-info{background:var(--blue-lt);color:var(--blue);border:2px solid #a5b4fc}
.lt-section{background:#fffbeb;border-top:2px solid var(--amber-mid);padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.lt-head{font-family:'Baloo 2';font-size:.88rem;font-weight:800;color:var(--text)}
.lt-list{display:flex;flex-direction:column;gap:6px}
.lt-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:var(--surface);border-radius:8px;padding:6px 10px;border:1.5px solid var(--border)}
.lt-wrong{color:var(--red);font-weight:700;font-size:.88rem;text-decoration:line-through}
.lt-arrow{color:var(--muted);font-size:.85rem}
.lt-sugs{display:flex;gap:5px;flex-wrap:wrap}
.lt-sug{background:var(--green-bg);border:2px solid var(--green-mid);color:var(--green);border-radius:20px;padding:3px 11px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:'Nunito';transition:all .18s}
.lt-sug:hover{background:var(--green);color:#fff}
.lt-reason{display:block;width:100%;margin-top:3px;font-size:.77rem;color:var(--muted);font-style:italic}
.lt-fixall{background:var(--green);color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:'Nunito';transition:background .2s;align-self:flex-start}
.lt-fixall:hover{background:#15803d}
.verdict{padding:14px 16px;border-top:2px solid var(--border);font-family:'Baloo 2';font-size:1rem;font-weight:800;display:flex;align-items:center;gap:8px}
.verdict.v-great{background:var(--green-bg);color:var(--green)}
.verdict.v-good{background:var(--amber-bg);color:var(--amber)}
.verdict.v-keep{background:var(--red-bg);color:var(--red)}
.dnd-label{font-family:'Baloo 2';font-size:.88rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.word-pool,.sentence-area{display:flex;flex-wrap:wrap;gap:8px;padding:12px;border:2.5px dashed var(--border);min-height:56px;border-radius:var(--radius-sm);transition:border-color .25s,background .25s}
.word-pool.over,.sentence-area.over{border-color:var(--blue);background:var(--blue-lt)}
.sentence-area.success{border-color:var(--green);background:var(--green-bg)}
.word-block{color:#fff;padding:7px 14px;border-radius:40px;cursor:grab;user-select:none;font-size:.9rem;font-weight:700;font-family:'Nunito';transition:opacity .15s,transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.word-block:hover{transform:translateY(-2px)}
.word-block.dragging{opacity:.45}
.block-feedback{font-size:.95rem;font-weight:700;padding:10px 0;min-height:2rem}
.block-counter{font-family:'Baloo 2';font-size:.82rem;font-weight:800;color:var(--muted);text-align:right;margin-bottom:4px}
.spinner{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .topbar{padding:10px 14px}
  .topbar-title{font-size:1rem}
  .tlink{font-size:.72rem;padding:5px 10px}
  .page{margin:16px auto 40px}
  .card-body{padding:14px 14px}
  .btn{padding:9px 14px;font-size:.85rem}
  .word-block{padding:6px 11px;font-size:.82rem}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-title" data-i18n="topbarTitle">✏️ Satzwerkstatt</div>
  <nav class="topbar-links">
    <a class="tlink" href="index.html" data-i18n="navBlockwelt">📖 Blockwelt</a>
    <a class="tlink" href="story.html" data-i18n="navSchreib">📝 Schreibwerkstatt</a>
    <a class="tlink" href="builder.html" data-i18n="navBaukasten">🧱 Baukasten</a>
    <button id="sw-lang-toggle" onclick="swToggleLang()" style="background:var(--blue);color:#fff;border:none;border-radius:20px;padding:4px 12px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;">🌐 DE</button>
  </nav>
</header>

<div class="page">

<!-- Schreibwerkstatt -->
<div class="card">
  <div class="card-hd"><span class="card-icon">🖊️</span>
    <div><div class="card-title" data-i18n="card1Title">Dein Satz</div>
         <div class="card-sub" data-i18n="card1Sub">Schreibe irgendeinen Satz – ich prüfe ihn für dich!</div></div>
  </div>
  <div class="card-body">
    <textarea class="s-ta" id="satz" spellcheck="true" placeholder="Schreibe hier deinen Satz …" data-i18n-ph="sentencePlaceholder" oninput="clearAssess()"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" id="checkBtn" onclick="checkSentence()" data-i18n="checkSentenceBtn">🔍 Satz prüfen</button>
      <button class="btn btn-outline" onclick="speakSentence()" data-i18n="speakBtn">🔊 Vorlesen</button>
    </div>
    <div id="assess" class="assess">
      <div class="assess-head" data-i18n="assessHead">📋 Meine Prüfung</div>
      <div class="checks-list" id="checks-list"></div>
      <div id="lt-section" class="lt-section" style="display:none">
        <div class="lt-head" id="lt-head"></div>
        <div class="lt-list" id="lt-list"></div>
        <button class="lt-fixall" id="lt-fixall" onclick="applyAllLT()" data-i18n="fixallBtn" style="display:none">✨ Alle auf einmal korrigieren</button>
      </div>
      <div class="verdict" id="verdict"></div>
    </div>
  </div>
</div>

<!-- Blockwelt -->
<div class="card">
  <div class="card-hd"><span class="card-icon">🧩</span>
    <div><div class="card-title" data-i18n="card2Title">Satzbau mit Blöcken</div>
         <div class="card-sub" data-i18n="card2Sub">Ziehe die Wörter in die richtige Reihenfolge</div></div>
  </div>
  <div class="card-body">
    <div class="block-counter" id="blockCounter"></div>
    <div>
      <div class="dnd-label" data-i18n="poolLabel">Wörter</div>
      <div class="word-pool" id="wordPool"></div>
    </div>
    <div>
      <div class="dnd-label" data-i18n="areaLabel">Dein Satz</div>
      <div class="sentence-area" id="sentenceArea"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkBlockSentence()" data-i18n="checkBlockBtn">🔍 Prüfen</button>
      <button class="btn btn-outline" onclick="resetBlocks()" data-i18n="reshuffleBtn">🔀 Neu mischen</button>
      <button class="btn btn-outline" onclick="skipBlock()" data-i18n="skipBtn">⏭ Überspringen</button>
    </div>
    <div class="block-feedback" id="blockFeedback"></div>
  </div>
</div>

</div>

<script>

/* ════════════════════════════════════════
   BLOCKWELT DRAG & DROP
════════════════════════════════════════ */
const BLOCK_SENTENCES = [
  { s: "Die Sonne scheint hell am Himmel.",
    w: ["Die Sonne","scheint","hell","am","Himmel"] },
  { s: "Wir spielen heute im Garten.",
    w: ["Wir","spielen","heute","im","Garten"] },
  { s: "Die Katze schläft auf dem Sofa.",
    w: ["Die Katze","schläft","auf","dem","Sofa"] },
  { s: "Das Mädchen malt ein buntes Bild.",
    w: ["Das Mädchen","malt","ein buntes","Bild"] },
  { s: "Der Junge rennt schnell zur Gans im Park.",
    w: ["Der Junge","rennt","schnell","zur","Gans","im","Park"] },
  { s: "Meine Schwester liest gerne Bücher.",
    w: ["Meine Schwester","liest","gerne","Bücher"] },
  { s: "Im Sommer fahren wir ans Meer.",
    w: ["Im Sommer","fahren","wir","ans","Meer"] },
  { s: "Der Lehrer schreibt die Aufgabe an die Tafel.",
    w: ["Der Lehrer","schreibt","die Aufgabe","an","die","Tafel"] },
  { s: "Die Kinder bauen eine große Schneeburg.",
    w: ["Die Kinder","bauen","eine große","Schneeburg"] },
  { s: "Heute backen wir einen leckeren Kuchen.",
    w: ["Heute","backen","wir","einen leckeren","Kuchen"] },
  { s: "Der Hund bringt dem Mann den Ball.",
    w: ["Der Hund","bringt","dem Mann","den","Ball"] },
  { s: "Das kleine Häschen hüpft über die Wiese.",
    w: ["Das kleine","Häschen","hüpft","über","die","Wiese"] },
];

/* A colour per sentence so blocks look fresh each round */
const BLOCK_COLORS = [
  "#4f6ef7","#16a34a","#7c3aed","#d97706",
  "#0891b2","#be185d","#dc2626","#059669",
  "#2563eb","#9333ea","#ca8a04","#0369a1"
];

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let _ltMatches = []; // LanguageTool matches for current sentence

/* ════════════════════════════════════════
   SENTENCE CHECKER
════════════════════════════════════════ */
function clearAssess() {
  document.getElementById('assess').style.display = 'none';
  _ltMatches = [];
}

async function checkSentence() {
  const ta  = document.getElementById('satz');
  const btn = document.getElementById('checkBtn');
  const text = ta.value.trim();

  if (!text) {
    showAssess([`<div class="check-row"><span class="check-icon check-warn">!</span>${sw_t('writeSentenceFirst')}</div>`], '', 'v-keep', '✏️ ' + sw_t('writeSentenceFirst'));
    return;
  }

  // ── Local structural checks ──────────────────────
  const checks = [];
  let structureOk = true;

  // Capital start
  if (text[0] === text[0].toUpperCase() && text[0] !== text[0].toLowerCase()) {
    checks.push(mkCheck('ok', '✓', sw_t('capitalOk')));
  } else {
    checks.push(mkCheck('warn', '!', sw_t('capitalWarn')));
    structureOk = false;
  }

  // Ends with period
  if (/[.!?]$/.test(text)) {
    checks.push(mkCheck('ok', '✓', sw_t('punctOk', text.slice(-1))));
  } else {
    checks.push(mkCheck('warn', '!', sw_t('punctWarn')));
    structureOk = false;
  }

  // Word count
  const wc = text.split(/\s+/).filter(Boolean).length;
  if (wc >= 5) {
    checks.push(mkCheck('ok', '✓', sw_t('wordsOk', wc)));
  } else {
    checks.push(mkCheck('warn', '!', sw_t('wordsWarn', wc)));
    structureOk = false;
  }

  // ── LanguageTool API ─────────────────────────────
  btn.innerHTML = '<span class="spinner">⏳</span> …';
  btn.disabled = true;

  let ltOk = true;
  try {
    const resp = await fetch('https://api.languagetool.org/v2/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ text, language: _l === 'en' ? 'en-GB' : 'de-DE' })
    });
    if (!resp.ok) throw new Error();
    const data = await resp.json();

    _ltMatches = data.matches || [];

    if (_ltMatches.length === 0) {
      checks.push(mkCheck('ok', '✓', sw_t('noErrors')));
    } else {
      ltOk = false;
      checks.push(mkCheck('warn', '!', sw_t('ltFound', _ltMatches.length)));
    }
  } catch(e) {
    checks.push(mkCheck('info', 'i', sw_t('ltUnavailable')));
  } finally {
    btn.innerHTML = sw_t('checkSentenceBtn');
    btn.disabled = false;
  }

  // ── Verdict ──────────────────────────────────────
  let vClass, vText;
  if (structureOk && ltOk) {
    vClass = 'v-great'; vText = sw_t('verdictPerfect');
  } else if (structureOk && !ltOk) {
    vClass = 'v-good';  vText = sw_t('verdictGood');
  } else {
    vClass = 'v-keep';  vText = sw_t('verdictKeep');
  }

  showAssess(checks, _ltMatches, vClass, vText);
}

function mkCheck(type, icon, text) {
  return `<div class="check-row">
    <span class="check-icon check-${type}">${icon}</span>
    <span>${text}</span>
  </div>`;
}

function showAssess(checks, ltMatches, vClass, vText) {
  document.getElementById('checks-list').innerHTML = checks.join('');

  const ltSec  = document.getElementById('lt-section');
  const ltHead = document.getElementById('lt-head');
  const ltList = document.getElementById('lt-list');
  const ltFix  = document.getElementById('lt-fixall');
  const ta     = document.getElementById('satz');

  if (Array.isArray(ltMatches) && ltMatches.length > 0) {
    ltHead.textContent = sw_t('ltHead', ltMatches.length);
    const withSugs = ltMatches.filter(m => m.replacements && m.replacements.length > 0);
    ltList.innerHTML = ltMatches.map((m, i) => {
      const wrong = ta.value.substring(m.offset, m.offset + m.length);
      const sugs  = (m.replacements || []).slice(0, 3).map(r => r.value);
      const msg   = m.shortMessage || m.message || '';
      const btns  = sugs.map(s =>
        `<button class="lt-sug" onclick="applyOneLT(${i},'${escAttr(s)}')">${escHtml(s)}</button>`
      ).join('');
      return `<div class="lt-row">
        <span class="lt-wrong">${escHtml(wrong || '?')}</span>
        ${sugs.length ? `<span class="lt-arrow">→</span><span class="lt-sugs">${btns}</span>` : ''}
        ${msg ? `<span class="lt-reason">${escHtml(msg)}</span>` : ''}
      </div>`;
    }).join('');
    ltFix.style.display = withSugs.length > 1 ? 'inline-block' : 'none';
    ltSec.style.display = 'flex';
  } else {
    ltSec.style.display = 'none';
  }

  const v = document.getElementById('verdict');
  v.className = `verdict ${vClass}`;
  v.textContent = vText;

  document.getElementById('assess').style.display = 'block';
  document.getElementById('assess').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ── Apply single LT suggestion ── */
function applyOneLT(idx, replacement) {
  const ta = document.getElementById('satz');
  const m  = _ltMatches[idx];
  if (!m) return;
  ta.value = ta.value.substring(0, m.offset) + replacement + ta.value.substring(m.offset + m.length);
  checkSentence(); // re-run full check
}

/* ── Apply all LT suggestions (end→start) ── */
function applyAllLT() {
  const ta = document.getElementById('satz');
  const sorted = [..._ltMatches].sort((a, b) => b.offset - a.offset);
  let text = ta.value;
  sorted.forEach(m => {
    if (m.replacements.length > 0) {
      text = text.substring(0, m.offset) + m.replacements[0].value + text.substring(m.offset + m.length);
    }
  });
  ta.value = text;
  checkSentence();
}

function speakSentence() {
  const text = document.getElementById('satz').value.trim();
  if (!text || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE'; u.rate = 0.9;
  speechSynthesis.speak(u);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

/* ════════════════════════════════════════
   DRAG & DROP BLOCKS
════════════════════════════════════════ */
const pool = document.getElementById('wordPool');
const area = document.getElementById('sentenceArea');
let dragged     = null;
let blockQueue  = [];   // shuffled index order
let blockPos    = 0;    // current position in queue
let blockBusy   = false; // prevents double-advance while animating

/* Shuffle the sentence order so every round is different */
function initQueue() {
  blockQueue = BLOCK_SENTENCES.map((_,i) => i).sort(() => Math.random() - .5);
  blockPos   = 0;
}

function currentEntry() {
  return BLOCK_SENTENCES[blockQueue[blockPos]];
}

function buildBlocks() {
  const { w } = currentEntry();
  const color  = BLOCK_COLORS[blockPos % BLOCK_COLORS.length];
  pool.innerHTML = '';
  area.innerHTML = '';
  area.classList.remove('success');
  document.getElementById('blockFeedback').textContent = '';
  blockBusy = false;
  // Shuffle word order for the puzzle
  [...w].sort(() => Math.random() - .5).forEach(word => pool.appendChild(makeBlock(word, color)));
  updateCounter();
}

function makeBlock(text, color) {
  const d = document.createElement('div');
  d.className   = 'word-block';
  d.draggable   = true;
  d.textContent = text;
  if (color) d.style.background = color;
  return d;
}

function updateCounter() {
  const el = document.getElementById('blockCounter');
  if (el) el.textContent = typeof sw_t === 'function'
    ? sw_t('counterText', blockPos + 1, BLOCK_SENTENCES.length)
    : `Satz ${blockPos + 1} von ${BLOCK_SENTENCES.length}`; // fallback before i18n loads
}

/* Reset = reshuffle current sentence (same puzzle, new block order) */
function resetBlocks() {
  buildBlocks();
}

/* Skip = advance to next sentence immediately */
function skipBlock() {
  advanceBlock();
}

function advanceBlock() {
  blockPos = (blockPos + 1) % BLOCK_SENTENCES.length;
  // When we've cycled through all sentences, re-shuffle for next round
  if (blockPos === 0) {
    blockQueue = BLOCK_SENTENCES.map((_,i) => i).sort(() => Math.random() - .5);
  }
  buildBlocks();
}

// Drag events
document.addEventListener('dragstart', e => {
  if (e.target.classList.contains('word-block')) {
    dragged = e.target;
    dragged.classList.add('dragging');
  }
});
document.addEventListener('dragend', e => {
  if (dragged) { dragged.classList.remove('dragging'); dragged = null; }
});

[pool, area].forEach(el => {
  el.addEventListener('dragover',  e => { e.preventDefault(); el.classList.add('over'); });
  el.addEventListener('dragleave', () => el.classList.remove('over'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('over');
    if (dragged) el.appendChild(dragged);
  });
});

function checkBlockSentence() {
  if (blockBusy) return;
  const blocks = area.querySelectorAll('.word-block');
  const fb     = document.getElementById('blockFeedback');
  if (!blocks.length) {
    fb.style.color = 'var(--amber)';
    fb.textContent = sw_t('fbEmpty');
    return;
  }
  const { s } = currentEntry();
  const built  = Array.from(blocks).map(b => b.textContent).join(' ') + '.';
  if (built.trim() === s.trim()) {
    blockBusy = true;
    area.classList.add('success');
    fb.style.color = 'var(--green)';
    fb.textContent = sw_t('fbRight');
    setTimeout(advanceBlock, 1800);
  } else {
    fb.style.color = 'var(--amber)';
    fb.textContent = sw_t('fbWrong');
  }
}

  const s = (SW_STRINGS[_l] || SW_STRINGS.de)[key];
  return typeof s === 'function' ? s(...args) : (s || key);
}

});
