<!-- ── BLOCKWELT ── -->
<div class="card">
<div class="card-hd">
  <span class="card-icon">🧱</span>
  <div>
    <div class="card-title">Blockwelt – Satzbau</div>
    <div class="card-sub">Ziehe die Wörter, um einen Satz zu bauen und erhalte sofort Feedback!</div>
  </div>
</div>
<div class="card-body">
<div class="word-pool" id="word-pool">
  <!-- Example words -->
  <div class="word-block" draggable="true">Ein</div>
  <div class="word-block" draggable="true">Mädchen</div>
  <div class="word-block" draggable="true">sie</div>
  <div class="word-block" draggable="true">war</div>
  <div class="word-block" draggable="true">Sara</div>
  <div class="word-block" draggable="true">und</div>
  <div class="word-block" draggable="true">dann</div>
  <div class="word-block" draggable="true">haben</div>
  <div class="word-block" draggable="true">sie</div>
  <div class="word-block" draggable="true">eine</div>
  <div class="word-block" draggable="true">Freundin</div>
  <div class="word-block" draggable="true">getroffen</div>
  <div class="word-block" draggable="true">namens</div>
  <div class="word-block" draggable="true">Paula</div>
</div>
<div class="sentence-area" id="sentence-area"></div>
<div class="block-feedback" id="block-feedback"></div>
<button class="btn btn-primary" onclick="checkBlockSentence()">Satz prüfen</button>
</div>
</div>

<script>
// ── Drag & Drop ──
const blocks=document.querySelectorAll('.word-block');
const sentenceArea=document.getElementById('sentence-area');
let dragged=null;
blocks.forEach(block=>{
  block.addEventListener('dragstart',e=>{dragged=block;block.classList.add('dragging');});
  block.addEventListener('dragend',e=>{dragged=null;block.classList.remove('dragging');});
});
sentenceArea.addEventListener('dragover',e=>{e.preventDefault();sentenceArea.classList.add('over');});
sentenceArea.addEventListener('dragleave',e=>{sentenceArea.classList.remove('over');});
sentenceArea.addEventListener('drop',e=>{
  e.preventDefault();sentenceArea.classList.remove('over');
  if(dragged){sentenceArea.appendChild(dragged.cloneNode(true));updateBlockFeedback();}
});

// ── Feedback & Checks ──
function updateBlockFeedback(){
  const text=[...sentenceArea.children].map(c=>c.textContent).join(' ').trim();
  const fb=document.getElementById('block-feedback');
  if(!text){fb.textContent='Ziehe Wörter hierher, um einen Satz zu bilden.';sentenceArea.className='sentence-area';return;}
  let structureOk=true;
  let messages=[];

  // Capital start
  if(text[0]===text[0].toUpperCase()){messages.push('Satzanfang ist großgeschrieben');}else{messages.push('Satzanfang sollte groß sein');structureOk=false;}

  // End punctuation
  if(/[.!?]$/.test(text)){messages.push('Satz endet korrekt mit Punkt/!/?');}else{messages.push('Füge ein Satzzeichen am Ende hinzu');structureOk=false;}

  // Redundant subject check
  const redundants=[/Ein\s+Mädchen\s+sie/i,/Der\s+Junge\s+er/i];
  redundants.forEach(r=>{if(r.test(text)){messages.push('⚠ Redundantes Subjekt entdeckt');structureOk=false;}});

  // Dangling names
  if(/namens\s+\w+/i.test(text)){messages.push('Name korrekt eingebunden');}

  fb.innerHTML=messages.join(' • ');
  sentenceArea.className='sentence-area '+(structureOk?'success':'');
}

// Manual check button
function checkBlockSentence(){
  updateBlockFeedback();
  const text=[...sentenceArea.children].map(c=>c.textContent).join(' ').trim();
  if(!text)return;
  // Run LT API check for advanced grammar
  fetch('https://api.languagetool.org/v2/check',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({text,language:'de-DE'})
  }).then(r=>r.json()).then(data=>{
    const matches=(data.matches||[]).filter(m=>m.replacements&&m.replacements.length>0);
    if(matches.length>0){
      const fb=document.getElementById('block-feedback');
      matches.forEach((m,i)=>{
        const wrong=text.substring(m.offset,m.offset+m.length);
        const sug=m.replacements[0]?.value||'';
        fb.innerHTML+=' <br>💡 "'+wrong+'" → "'+sug+'"';
      });
    }
  }).catch(()=>{console.log('LT check failed');});
}
</script>
