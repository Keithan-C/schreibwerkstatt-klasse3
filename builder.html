<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Satz Builder – Klasse 3</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f7ff;
text-align:center;
padding:30px;
}

h1{
color:#2c3e50;
}

.instructions{
margin-bottom:20px;
font-size:18px;
}

.blocks{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:30px;
}

.block{
padding:12px 18px;
background:#4da6ff;
color:white;
border-radius:8px;
cursor:grab;
font-size:18px;
}

.block:hover{
background:#2e86de;
}

#sentence{
min-height:80px;
border:3px dashed #999;
border-radius:10px;
padding:20px;
margin-bottom:20px;
background:white;
font-size:20px;
}

button{
padding:10px 20px;
font-size:16px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.check{
background:#27ae60;
color:white;
}

.clear{
background:#e74c3c;
color:white;
}

#feedback{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.suggestion{
margin-top:10px;
color:#2c3e50;
font-size:18px;
}

</style>
</head>

<body>

<h1>Satz-Baumeister</h1>

<div class="instructions">
Ziehe die Wörter in das Feld und baue einen Satz.
</div>

<div class="blocks">
<div class="block" draggable="true">Der</div>
<div class="block" draggable="true">Papagei</div>
<div class="block" draggable="true">schaut</div>
<div class="block" draggable="true">die</div>
<div class="block" draggable="true">Menschen</div>
<div class="block" draggable="true">an</div>
</div>

<div id="sentence">
Ziehe die Wörter hier hinein...
</div>

<button class="check" onclick="checkSentence()">Satz prüfen</button>
<button class="clear" onclick="clearSentence()">Neu</button>

<div id="feedback"></div>
<div class="suggestion" id="suggestion"></div>

<script>

const blocks = document.querySelectorAll(".block");
const sentenceBox = document.getElementById("sentence");

blocks.forEach(block=>{
block.addEventListener("dragstart",dragStart);
});

sentenceBox.addEventListener("dragover",dragOver);
sentenceBox.addEventListener("drop",dropWord);

function dragStart(e){
e.dataTransfer.setData("text",e.target.innerText);
}

function dragOver(e){
e.preventDefault();
}

function dropWord(e){
e.preventDefault();
let word = e.dataTransfer.getData("text");

let span = document.createElement("span");
span.innerText = word + " ";
sentenceBox.appendChild(span);
}

function checkSentence(){

let sentence = sentenceBox.innerText.trim();

let correct = "Der Papagei schaut die Menschen an";

if(sentence === correct){

document.getElementById("feedback").innerText = "✅ Super! Der Satz ist richtig.";
document.getElementById("suggestion").innerText = "";

}

else{

document.getElementById("feedback").innerText = "❌ Fast! Schau dir den Vorschlag an.";
document.getElementById("suggestion").innerText = "Vorschlag: " + correct;

}

}

function clearSentence(){
sentenceBox.innerHTML="Ziehe die Wörter hier hinein...";
document.getElementById("feedback").innerText="";
document.getElementById("suggestion").innerText="";
}

</script>

</body>
</html>
